<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Deezer → Navidrome</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      Deezer → Navidrome
      <sub id="version-tag" style="font-size: 0.65rem; opacity: 0.7;"></sub>
      <a id="new-version-tag" class="new-version-badge hidden" href="#" target="_blank" title="Click to view release">
        <span class="badge-content">New version available</span>
      </a>
    </div>
    <nav>
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('config_view') }}">Config</a>
    </nav>
  </header>

  <main class="page">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-wrap">
          {% for message in messages %}
            <div class="flash">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script>
    // Configuration
    const VERSION_CHECK_INTERVAL = 15 * 60 * 1000; // 15 minutes

    // Display current version
    function displayCurrentVersion() {
      fetch('/api/version')
        .then(r => r.json())
        .then(data => {
          const tag = document.getElementById('version-tag');
          if (tag && data.version) {
            tag.textContent = 'v' + data.version;
          }
        })
        .catch(err => console.log('Version check skipped'));
    }

    // Check for latest version
    async function checkForLatestVersion() {
      try {
        const response = await fetch('/api/latest-version');
        const data = await response.json();

        if (data.update_available && data.latest_version) {
          const badge = document.getElementById('new-version-tag');
          if (badge) {
            badge.href = data.url || '#';
            badge.classList.remove('hidden');
            const contentSpan = badge.querySelector('.badge-content');
            if (contentSpan) {
              contentSpan.textContent = `New: v${data.latest_version}`;
              contentSpan.title = `Update available from v${data.current_version} to v${data.latest_version}`;
            }
          }
        }
      } catch (err) {
        console.log('Latest version check skipped:', err);
      }
    }

    // Initialize version checking
    displayCurrentVersion();
    checkForLatestVersion();

    // Check for updates periodically
    setInterval(checkForLatestVersion, VERSION_CHECK_INTERVAL);
  </script>
</body>
</html>
