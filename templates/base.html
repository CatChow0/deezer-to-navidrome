<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Deezer → Navidrome</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      Deezer → Navidrome<sub id="version-tag" style="font-size: 0.65rem; opacity: 0.7;"></sub>
    </div>
    <nav>
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('config_view') }}">Config</a>
    </nav>
  </header>

  <main class="page">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-wrap">
          {% for message in messages %}
            <div class="flash">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script>
    // Charger et afficher la version
    fetch('/api/version')
      .then(r => r.json())
      .then(data => {
        const tag = document.getElementById('version-tag');
        if (tag && data.version) {
          tag.textContent = 'v' + data.version;
        }
      })
      .catch(err => console.log('Version check skipped'));
  </script>
</body>
</html>
